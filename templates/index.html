<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Premium E-commerce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .product-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
        }

        .product-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .price {
            font-size: 2rem;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .stock-info {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: #666;
        }

        .stock-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 8px;
        }

        .stock-badge.low {
            background: #fff3e0;
            color: #e65100;
        }

        .stock-badge.out {
            background: #ffebee;
            color: #c62828;
        }

        .buy-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: auto;
        }

        .buy-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .buy-button:active:not(:disabled) {
            transform: scale(0.95);
        }

        .buy-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-stock {
            color: #c62828;
            font-weight: 600;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: white;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Shop</h1>
            <p class="subtitle">Discover our premium collection</p>
        </header>

        <div class="products-grid">
            {% for p in products %}
            <div class="product-card">
                <div class="product-header">
                    <div class="product-name">{{ p.name }}</div>
                </div>
                <div class="product-content">
                    <div class="price">${{ "%.2f"|format(p.price) }}</div>
                    <div class="stock-info">
                        📦 Stock:
                        <span class="stock-badge {% if p.stock == 0 %}out{% elif p.stock < 5 %}low{% endif %}">
                            {{ p.stock }} units
                        </span>
                    </div>
                    {% if p.stock > 0 %}
                        <button class="buy-button" onclick="buy({{ p.id }})">Buy</button>
                    {% else %}
                        <div class="empty-stock">Out of Stock</div>
                    {% endif %}
                </div>
            </div>
            {% endfor %} 
        </div>

        <footer>
            <p>&copy; 2026 Premium E-commerce Shop. All rights reserved.</p>
        </footer>
    </div>

    <script>
        async function buy(id) {
            const res = await fetch("/order", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({product_id: id, quantity: 1})
            });

            const data = await res.json();
            alert(JSON.stringify(data));
            location.reload();
        }
    </script>
</body>
</html>
