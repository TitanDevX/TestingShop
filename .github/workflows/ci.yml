name: CI Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt
      - run: playwright install

      - run: python -m pytest

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: GitLeaks Scan
        uses: zricethezav/gitleaks-action@master